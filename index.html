<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DTF Studio Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}
canvas {
  border: 1px solid #444;
  margin-top: 10px;
  max-width: 95%;
}
button {
  margin: 5px;
  padding: 10px;
  border: none;
  background: #00c853;
  color: white;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2>🔥 DTF Studio Pro</h2>

<input type="file" id="upload"><br>

<button onclick="removeBG()">Quitar fondo</button>
<button onclick="flip()">Voltear</button>
<button onclick="invertColors()">Invertir colores</button>
<button onclick="halftone()">Semitonos</button>
<button onclick="separate()">Separar colores</button>
<button onclick="cmyk()">CMYK</button>
<button onclick="undo()">↩️ Deshacer</button>
<button onclick="redo()">↪️ Rehacer</button>
<br>
<button onclick="downloadPNG()">Exportar PNG</button>
<button onclick="downloadSVG()">Exportar SVG</button>

<br>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let history = [];
let redoStack = [];

document.getElementById("upload").addEventListener("change", e => {
  const img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    saveState();
  };
  img.src = URL.createObjectURL(e.target.files[0]);
});

function saveState() {
  history.push(canvas.toDataURL());
  redoStack = [];
}

function restoreState(stackFrom, stackTo) {
  if (!stackFrom.length) return;
  stackTo.push(canvas.toDataURL());
  const img = new Image();
  img.onload = () => ctx.drawImage(img, 0, 0);
  img.src = stackFrom.pop();
}

function undo() {
  restoreState(history, redoStack);
}

function redo() {
  restoreState(redoStack, history);
}

// VOLTEAR
function flip() {
  saveState();
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(canvas, 0, 0);
  ctx.setTransform(1,0,0,1,0,0);
}

// INVERTIR COLORES (BLANCO ↔ NEGRO)
function invertColors() {
  saveState();
  let img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    let avg = (d[i] + d[i+1] + d[i+2]) / 3;
    let val = avg > 128 ? 0 : 255;

    d[i] = d[i+1] = d[i+2] = val;
  }

  ctx.putImageData(img, 0, 0);
}

// SEMITONO
function halftone() {
  saveState();
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = img.data;

  for(let y=0;y<canvas.height;y+=6){
    for(let x=0;x<canvas.width;x+=6){
      let i=(y*canvas.width+x)*4;
      let avg=(d[i]+d[i+1]+d[i+2])/3;
      let size = avg/255*5;

      ctx.fillStyle="black";
      ctx.beginPath();
      ctx.arc(x,y,size,0,Math.PI*2);
      ctx.fill();
    }
  }
}

// SEPARACIÓN SIMPLE
function separate() {
  saveState();
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    let avg = (d[i] + d[i+1] + d[i+2]) / 3;
    let val = avg > 128 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = val;
  }

  ctx.putImageData(img,0,0);
}

// CMYK SIMULADO
function cmyk() {
  saveState();
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    d[i] = 255 - d[i];     // C
    d[i+1] = 255 - d[i+1]; // M
    d[i+2] = 255 - d[i+2]; // Y
  }

  ctx.putImageData(img,0,0);
}

// QUITAR FONDO SIMPLE
function removeBG() {
  saveState();
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    if (d[i] > 200 && d[i+1] > 200 && d[i+2] > 200) {
      d[i+3] = 0;
    }
  }

  ctx.putImageData(img,0,0);
}

// EXPORTAR PNG
function downloadPNG() {
  let link = document.createElement("a");
  link.download = "dtf.png";
  link.href = canvas.toDataURL();
  link.click();
}

// EXPORTAR SVG (BÁSICO)
function downloadSVG() {
  let svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}">
    <image href="${canvas.toDataURL()}" width="100%" height="100%"/>
  </svg>`;

  let blob = new Blob([svg], {type: "image/svg+xml"});
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "dtf.svg";
  link.click();
}
</script>

</body>
</html>
